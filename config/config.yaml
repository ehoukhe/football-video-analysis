# === Konfiguration för fotbolls-videoanalys ===
# Alla värden kan överstyras via CLI-flaggor i scripts/analyze_match.py

model:
  # YOLOv8-modell. Alternativ (liten -> stor, snabb -> noggrann):
  # yolov8n.pt, yolov8s.pt, yolov8m.pt, yolov8l.pt, yolov8x.pt
  # Ladas ner automatiskt av ultralytics första gången.
  weights: "yolov8n.pt"
  conf: 0.30          # bas-tröskel om player/ball_conf inte anges (0-1)
  # Separata trösklar per klass. Bollen är svårdetekterad -> låg tröskel.
  # Spelare -> högre tröskel för att sålla bort publik/bänk.
  player_conf: 0.35
  ball_conf: 0.15
  iou: 0.50           # IoU-tröskel för non-max suppression
  device: ""          # "" = auto (GPU om tillgänglig), "cpu", "0" för första GPU
  half: true          # FP16 – ~1.5-2x snabbare på GPU (T4). Ignoreras på CPU.
  imgsz: 640          # inferensupplösning. Högre (960/1280) = bättre bolldetektering men långsammare.
  # COCO-klasser vi bryr oss om: 0 = person, 32 = sports ball
  classes: [0, 32]

tracker:
  # Inbyggd tracker i ultralytics. "bytetrack.yaml" eller "botsort.yaml"
  type: "bytetrack.yaml"

video:
  # Läs var N:te bildruta för snabbare bearbetning (1 = varje ruta).
  frame_stride: 1
  # Skala ner till denna bredd innan detektering (behåller proportioner).
  # 0 = ingen skalning.
  resize_width: 1280
  # Max antal rutor att bearbeta (0 = hela videon). Bra för snabbtest.
  max_frames: 0
  # Hoppa över introt: starta analysen efter så här många sekunder in i videon.
  # Bra för att skippa uppställning/ceremoni före avspark.
  start_seconds: 0
  # Analysera bara ett segment på så här många sekunder (0 = till slutet).
  duration_seconds: 0

pitch:
  # Ungefärliga plandimensioner i meter (för statistik/heatmap-axlar).
  length_m: 105
  width_m: 68

  # Plankalibrering: mappa bildpixlar -> meter för top-down-vy, heatmaps i meter
  # och löpsträckor i meter. Av som standard.
  calibrate: false
  # "static" = en fast homografi (STILLASTÅENDE kamera). "auto" = per-ruta
  # nyckelpunkter (RÖRLIG kamera) – kräver tränad modell (Fas 2, ej klar än).
  calibrator: "static"
  # För "static": para ihop minst 4 bildpunkter (pixlar) med plankoordinater
  # (meter). Plankoordinater: x = 0..längd, y = 0..bredd, origo övre vänstra hörn.
  # Exempel (byt ut mot din films faktiska punkter):
  # image_points: [[210, 880], [1700, 870], [95, 520], [1810, 515]]
  # pitch_points: [[0, 68], [105, 68], [0, 0], [105, 0]]
  image_points: []
  pitch_points: []

teams:
  # Lag-uppdelning för possession och lagvisa heatmaps.
  enable: false
  # mode: "auto" = klustra tröjfärger automatiskt (k-means, ingen handpåläggning).
  #       "manual" = använd de fasta HSV-intervallen nedan.
  mode: "auto"
  team_a_name: "Lag A"
  team_b_name: "Lag B"
  # HSV-intervall (används endast i mode: "manual") [H(0-179), S(0-255), V(0-255)]
  team_a_hsv_low: [100, 80, 50]    # ex. blått
  team_a_hsv_high: [130, 255, 255]
  team_b_hsv_low: [0, 80, 50]      # ex. rött
  team_b_hsv_high: [10, 255, 255]

output:
  dir: "output"
  save_video: true          # spara annoterad video
  save_heatmap: true        # spara heatmaps
  save_stats: true          # spara statistik som CSV/JSON
  heatmap_bins: [68, 105]   # upplösning på heatmap-rutnät [y, x]
